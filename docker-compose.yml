services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.example
    depends_on:
      - db
      - redis
      - inference
    volumes:
      - ./backend/app:/code/backend/app
    command: uvicorn backend.app.main:app --host 0.0.0.0 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.example
    depends_on:
      - db
      - redis
      - inference
    volumes:
      - ./backend/app:/code/backend/app
    command: celery -A backend.app.workers.celery_app worker -l info -c 2

  inference:
    build:
      context: ./inference
      dockerfile: Dockerfile.gpu
    ports:
      - "8001:8001"
    env_file:
      - ./inference/.env.example
    volumes:
      - ./inference/ml/weights:/code/inference/ml/weights
    command: uvicorn inference.app.main:app --host 0.0.0.0 --port 8001
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: synthcode
      POSTGRES_USER: synthcode
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:

